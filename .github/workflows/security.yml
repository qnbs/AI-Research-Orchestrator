# ==============================================================================
# Security workflows: CodeQL, Dependency Review, scheduled audit, secret scan,
# SonarQube Cloud (CI-based analysis)
# ==============================================================================

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        # github/codeql-action/init@v4
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        # github/codeql-action/autobuild@v4
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze@v4
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          category: "/language:javascript-typescript"

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Dependency Review
        # actions/dependency-review-action@v4
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
          comment-summary-in-pr: true

  pnpm-audit:
    name: pnpm audit (high+)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Setup pnpm
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          run_install: false

      - name: Setup Node.js
        # actions/setup-node@v6
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks
        # gitleaks/gitleaks-action@v2
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # SonarQube Cloud — CI-based analysis (replaces Automatic Analysis)
  #
  # Prerequisite: SONAR_TOKEN repository secret (SonarQube Cloud → My Account →
  # Security). Verified live (docs/sonarcloud-setup-todo.md): Automatic Analysis
  # does not need to be manually disabled - a CI-submitted scan already
  # completes successfully alongside it - and a custom Quality Gate is not
  # available on the free tier this repo is on regardless, so this job targets
  # the built-in read-only "Sonar way" gate rather than a custom one.
  #
  # Starts non-blocking (continue-on-error). Promote to blocking once the gate
  # has run clean across several real PRs — same pattern as e2e.yml.
  # ---------------------------------------------------------------------------
  sonarcloud:
    name: SonarQube Cloud
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    # Advisory phase: do not fail the Security workflow on gate/scanner issues.
    continue-on-error: true
    steps:
      # secrets.* is not a valid job-level `if:` context (only github/inputs/
      # needs/vars are) - so the presence check has to happen in a step, via
      # env:, and be consumed by later steps' `if: steps.*.outputs.*`. Runs
      # first (before checkout) so the whole job - including the full-history
      # checkout below - stays a true no-op without the secret, e.g. on a
      # fork PR that never receives repo secrets in the first place.
      - name: Check SONAR_TOKEN is configured
        id: check_token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check_token.outputs.present == 'true'
        # actions/checkout@v7 — full history for blame / new-code detection
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        if: steps.check_token.outputs.present == 'true'
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          run_install: false

      - name: Setup Node.js
        if: steps.check_token.outputs.present == 'true'
        # actions/setup-node@v6
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.check_token.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Unit tests with coverage (lcov for Sonar)
        if: steps.check_token.outputs.present == 'true'
        run: pnpm run test:coverage

      - name: SonarQube Cloud Scan
        if: steps.check_token.outputs.present == 'true'
        # SonarSource/sonarqube-scan-action@v8.2.1
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # qualitygate.wait deliberately omitted during the advisory phase.
        # After the gate is proven stable, add:
        #   args: >-
        #     -Dsonar.qualitygate.wait=true
        #     -Dsonar.qualitygate.timeout=300
        # and flip continue-on-error to false (see docs/sonarcloud-setup-todo.md).
