# ==============================================================================
# GitHub Pages Deployment Workflow for Vite + React PWA
#
# This workflow builds and deploys the application to GitHub Pages using the
# official GitHub Pages Actions (2024/2025 best practices).
#
# Prerequisites:
#   1. Go to Repository Settings → Pages
#   2. Under "Build and deployment", select "GitHub Actions" as the source
#   3. The first deployment will be triggered automatically
# ==============================================================================

name: Deploy to GitHub Pages

on:
  # Trigger on push to main branch
  push:
    branches:
      - main

  # Verify build + tests on PRs targeting main (no Pages deploy)
  pull_request:
    branches:
      - main

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Required permissions (minimal by default)
permissions:
  contents: read # To checkout the repository

# Prevent concurrent deployments
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ==============================================================================
  # Build Job
  # ==============================================================================
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full history for better caching
          persist-credentials: false

      # Step 2: Setup pnpm (version via packageManager in package.json)
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      # Step 3: Setup Node.js with pnpm caching
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm major version
        run: |
          pnpm --version
          pnpm --version | grep -E '^11\.'

      # Step 4: Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high

      # Step 5: Run type checking (aligned with package.json "typecheck")
      - name: Type check
        run: pnpm run typecheck

      # Step 6: Lint (warnings allowed up to budget; errors fail)
      - name: ESLint
        run: pnpm run lint

      # Step 7: Unit tests + coverage thresholds (store/services/hooks/lib scope — see vitest.config.ts)
      - name: Tests with coverage
        run: pnpm run test:coverage

      # Step 8: Build for production
      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      # Step 9: Copy 404.html for SPA routing
      - name: Setup SPA routing
        run: cp dist/index.html dist/404.html

      # Step 10: Configure GitHub Pages (main branch pushes / manual only)
      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      # Step 11: Upload build artifacts for Pages deployment
      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./dist"

  # ==============================================================================
  # Deploy Job
  # ==============================================================================
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write

    # GitHub Pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
