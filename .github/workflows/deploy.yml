# ==============================================================================
# GitHub Pages Deployment Workflow for Vite + React PWA
#
# PR/main: quality gates (lint, typecheck, tests, build)
# main only: Pages upload + deploy
# ==============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, Lint & Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        # actions/checkout@v7
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          run_install: false

      - name: Setup Node.js
        # actions/setup-node@v6
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify pnpm major version
        run: |
          pnpm --version
          pnpm --version | grep -E '^11\.'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high

      - name: Type check
        run: pnpm run typecheck

      - name: ESLint
        run: pnpm run lint

      - name: Tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage artifact
        if: always()
        # actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Production Build
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        # actions/checkout@v7
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # pnpm/action-setup@v6
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          run_install: false

      - name: Setup Node.js
        # actions/setup-node@v6
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Bundle budget
        run: pnpm run bundle:budget

      - name: Setup SPA routing
        run: cp dist/index.html dist/404.html

      - name: Lighthouse CI
        run: pnpm exec lhci autorun

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        # actions/configure-pages@v6
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        # actions/upload-pages-artifact@v5
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: "./dist"

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@v5
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
