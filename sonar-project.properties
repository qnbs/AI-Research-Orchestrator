# SonarQube Cloud (formerly SonarCloud) — CI-based analysis
#
# projectKey / organization must match the bound project in the
# SonarQube Cloud dashboard. The conventional GitHub-App format is
# used here; verify under Project Information if analysis fails with
# "Project not found".
sonar.organization=qnbs
sonar.projectKey=qnbs_AI-Research-Orchestrator
sonar.projectName=AI Research Orchestrator

# Source layout — colocated tests under src/, E2E under src/test/e2e/
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.{test,spec}.{ts,tsx},**/src/test/**
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/public/icons/**,**/scripts/**

# Coverage (produced by `pnpm run test:coverage` via vitest lcov reporter)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.{test,spec}.{ts,tsx},**/src/test/**,**/src/components/icons/**,**/src/i18n/translations.ts

# Copy-paste detection exclusions for intentional parallel structure:
# - i18n EN/DE blocks share keys by design (same shape, different values)
# - scripts/check-*.mjs deliberately mirror each other for consistency
sonar.cpd.exclusions=**/src/i18n/translations.ts,**/scripts/**

# Encoding / language
sonar.sourceEncoding=UTF-8
