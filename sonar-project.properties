# SonarQube Cloud — CI-based analysis, optimized for FREE TIER
#
# Free tier: only the built-in read-only "Sonar way" quality gate is available.
# Custom quality gates require Team/Enterprise — do not rely on them.
#
# Sonar way conditions on NEW CODE:
#   - 0 new bugs (Reliability = A)
#   - 0 new vulnerabilities (Security = A)
#   - Maintainability rating = A
#   - All new Security Hotspots reviewed
#   - Coverage on new code >= 80%
#   - Duplicated lines on new code <= 3%
#
# Strategy: narrow coverage/CPD scope to code we actually measure and to
# patterns that are intentionally repetitive (i18n, static data), so Sonar way
# stays passable without a paid custom gate.
#
# Verify organization/projectKey in the SonarQube Cloud dashboard if the scan
# reports "Project not found".
sonar.organization=qnbs
sonar.projectKey=qnbs_AI-Research-Orchestrator
sonar.projectName=AI Research Orchestrator

# Analyze application source under src/
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.{test,spec}.{ts,tsx},**/src/test/**

# Full exclusions from analysis (noise / non-product paths)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/public/**,\
  **/scripts/**,\
  **/src/test/**,\
  **/*.{test,spec}.{ts,tsx}

# Coverage: only score the same logic layers Vitest gates (80% lines).
# UI components/contexts/data are E2E-oriented and would otherwise tank
# Sonar way's "coverage on new code >= 80%" whenever a UI-only PR lands.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.inclusions=\
  **/src/store/**,\
  **/src/services/**,\
  **/src/hooks/**,\
  **/src/lib/**
sonar.coverage.exclusions=\
  **/*.{test,spec}.{ts,tsx},\
  **/src/test/**,\
  **/src/components/**,\
  **/src/contexts/**,\
  **/src/data/**,\
  **/src/i18n/**,\
  **/src/App.tsx,\
  **/src/index.css,\
  **/src/spaRouteRestore.ts,\
  **/src/types.ts,\
  **/src/types/**

# Duplication: exclude intentionally repetitive / data-heavy files so Sonar way's
# "duplicated lines on new code <= 3%" remains achievable on free tier.
sonar.cpd.exclusions=\
  **/src/i18n/translations.ts,\
  **/src/data/**,\
  **/src/services/nonAi/sampleData.ts,\
  **/src/services/nonAi/journalData.ts,\
  **/src/services/nonAi/meshDictionary.ts,\
  **/src/services/nonAi/stopwords.ts,\
  **/scripts/**,\
  **/src/components/icons/**

sonar.sourceEncoding=UTF-8
