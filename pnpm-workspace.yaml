  - brace-expansion@5.0.6
  - vite@6.4.3
  - dompurify@3.4.7
  - dompurify@3.4.6
  - dompurify@3.4.9
  - dompurify@3.4.8
  - undici@7.28.0
  - dompurify@3.4.11
  - js-yaml@4.1.2
  - ws@8.21.0
  - protobufjs@7.6.1
  - protobufjs@7.6.3
  - "@babel/core@7.29.1"
onlyBuiltDependencies:
  - "@google/genai"
  - "@tailwindcss/oxide"
  - core-js
  - esbuild
  - protobufjs
  - sharp
peerDependencyRules:
  allowedVersions:
    typescript: "5.8.3"
  ignoreMissing:
    - "@types/node"
strictPeerDependencies: true

overrides:
