packages:
  - "."
allowBuilds:
  "@google/genai": true
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true

autoInstallPeers: false
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - brace-expansion@5.0.6
  - js-yaml@4.1.2
  - protobufjs@7.6.3
  - '@babel/core@7.29.1'
onlyBuiltDependencies:
  - "@google/genai"
  - "@tailwindcss/oxide"
  - core-js
  - esbuild
  - protobufjs
  - sharp

overrides:
  protobufjs: 7.6.1
  undici: 7.28.0
  vite: 6.4.3
  ws: 8.21.1
peerDependencyRules:
  allowedVersions:
    typescript: "5.8.3"
  ignoreMissing:
    - "@types/node"
strictPeerDependencies: true
