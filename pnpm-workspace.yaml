packages:
  - "."
allowBuilds:
  "@google/genai": true
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true

autoInstallPeers: false
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - ws@8.20.1
  - protobufjs@7.5.8
  - brace-expansion@5.0.6
  - vite@6.4.3
  - dompurify@3.4.7
  - dompurify@3.4.6
  - dompurify@3.4.9
  - dompurify@3.4.8
  - undici@7.28.0
  - dompurify@3.4.11
  - js-yaml@4.1.2
  - ws@8.21.0
  - protobufjs@7.6.1
  - protobufjs@7.6.3
  - "@babel/core@7.29.1"
onlyBuiltDependencies:
  - "@google/genai"
  - "@tailwindcss/oxide"
  - core-js
  - esbuild
  - protobufjs
  - sharp
peerDependencyRules:
  allowedVersions:
    typescript: "5.8.3"
  ignoreMissing:
    - "@types/node"
strictPeerDependencies: true

overrides:
  vite: 6.4.3
  undici: 7.28.0
  ws: 8.21.1
  # GHSA-f38q-mgvj-vph7 (<=7.6.2) + GHSA-j3f2-48v5-ccww (<=7.6.4); @google/genai's own
  # range is ^7.5.4, satisfied by 7.6.5
  protobufjs: 7.6.5
  # GHSA-3jxr-9vmj-r5cp: two independent major lines in the tree need separate pins —
  # minimatch@3.1.5 (eslint/@lhci/cli chain) wants ^1.1.7, minimatch@9.0.9
  # (@google/genai/@vitest/coverage-v8 chain) wants ^2.0.2
  "brace-expansion@^1.1.7": 1.1.16
  "brace-expansion@^2.0.2": 2.1.2
  # GHSA-w5hq-g745-h8pq: @lhci/cli pins uuid@8.3.2 directly
  uuid: 11.1.1
  # @lhci/cli pulls tmp@0.0.33 / 0.1.0 (GHSA-ph9p-34f9-6g65); pin patched release
  tmp: 0.2.7
