      :root.light {

        --color-border: rgba(100, 116, 139, 0.28);
        --color-text-primary: #0f172a;
        --color-text-secondary: #475569;
        --color-brand-accent: #0f766e;
        --color-brand-primary: #0d9488;
        --color-brand-secondary: #0284c7;
        --color-brand-text-on-accent: #ffffff;
        --color-glow: rgba(15, 118, 110, 0.22);
        --color-accent-cyan: #0891b2;
        --color-accent-magenta: #e11d48;
        --color-accent-amber: #b45309;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 8px 20px -8px rgba(15, 23, 42, 0.12);

        --aurora-1: rgba(13, 148, 136, 0.07);
        --aurora-2: rgba(2, 132, 199, 0.06);
        --aurora-3: rgba(100, 116, 139, 0.05);
      }
      :root.matrix {
        --color-background: #020805;
        --color-surface: rgba(0, 24, 12, 0.78);
        --color-border: rgba(52, 211, 153, 0.22);
        --color-text-primary: #d1fae5;
        --color-text-secondary: #6ee7b7;
        --color-brand-accent: #34d399;
        --color-brand-primary: #10b981;
        --color-brand-secondary: #6ee7b7;
        --color-brand-text-on-accent: #022c22;
        --color-glow: rgba(52, 211, 153, 0.4);
        --color-accent-cyan: #5eead4;
        --aurora-1: rgba(52, 211, 153, 0.1);
        --aurora-2: rgba(16, 185, 129, 0.07);
        --aurora-3: rgba(110, 231, 183, 0.05);
      }
      body {
        font-family: var(--font-family);
        background-color: var(--color-background);
        color: var(--color-text-primary);
        overflow-x: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(circle at 50% 50%, var(--aurora-1) 0%, transparent 40%),
          radial-gradient(circle at 85% 15%, var(--aurora-2) 0%, transparent 35%),
          radial-gradient(circle at 15% 85%, var(--aurora-3) 0%, transparent 35%);
        animation: auroraMove 80s linear infinite alternate;
        z-index: -2;
        pointer-events: none;
        filter: blur(60px);
      }
      :focus-visible {
        outline: 2px solid var(--color-brand-accent);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
      }
      .no-animations * {
        animation: none !important;
        transition: none !important;
      }
      .brand-gradient-text {
        background: linear-gradient(135deg, var(--color-brand-accent) 0%, var(--color-brand-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      @media (prefers-reduced-motion: reduce) {
        body::before { animation: none !important; }
      }
      @keyframes auroraMove {
        0% { transform: rotate(0deg) scale(1); }
        100% { transform: rotate(4deg) scale(1.06); }
      }
